scheduler:
  timezone: Asia/Shanghai
  misfire_grace_minutes: 600
  cross_day_backfill: false

browser:
  channel: chrome
  headless: false
  profile_dir: runtime/browser-profile
  locale: zh-CN
  timezone_id: Asia/Shanghai
  keep_open_after_manual_run: true

auth:
  # 白名单只包含 Cookie 名称，永远不要在此文件写入 Cookie 值。
  # 下列名称来自已失效的真实会话样本，运行时只传递当前 Profile 中实际存在的项。
  cookie_names:
    - s_v_web_id
    - passport_csrf_token
    - passport_csrf_token_default
    - ttwid
    - odin_tt
    - passport_auth_status
    - passport_auth_status_ss
    - uid_tt
    - uid_tt_ss
    - sid_tt
    - sessionid
    - sessionid_ss
    - ucas_c0_compass
    - ucas_c0_ss_compass
    - sid_guard
    - session_tlb_tag
    - sid_ucp_v1
    - ssid_ucp_v1
    - LUOPAN_DT
    - COMPASS_LUOPAN_DT
    - ecom_us_lt_compass
    - ecom_us_lt_ss_compass
    - x-web-secsdk-uid
    - csrf_session_id

http:
  # 三个一级分类并行；每个三级分类最多三页预取；全局请求不超过九个。
  level1_concurrency: 3
  page_concurrency: 3
  max_in_flight_requests: 9
  request_interval_seconds:
    min: 0.01
    max: 0.03
  connect_timeout_seconds: 10
  read_timeout_seconds: 30

database:
  path: runtime/data/collector.db

retention:
  raw_response_days: 30
  failure_artifact_days: 10
  log_days: 10
  delete_database_records: false
  delete_exports: false

tasks:
  - id: product_hot_sale_all_level3
    enabled: true
    display_name: 全行业三级分类商品实时榜
    schedule: "0 14 * * *"
    rank:
      type: product_hot_sale
      endpoint_path: /compass_api/shop/product/product_rank/market_hot_sale
      rank_data_type: 1
      activity_id: ""
    category_scope:
      mode: all_level1
      target_level: 3
      exclude_all: true
    filters:
      # 已验证：0 表示非知名品牌 1 表示知名品牌。
      brand_type: 0
      # 已验证：不限表示不限制商品价格带。
      price_bin: "不限"
      search_info: ""
    date:
      strategy: today
      date_type: 1
