name: Package desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # 只安装运行与 PyInstaller 所需依赖；完整测试保留给本地开发或独立检查。
      - name: Install packaging dependencies
        run: uv sync --frozen --group package
      - name: Build portable desktop archive
        run: uv run python scripts/package_pyinstaller.py --target ${{ matrix.target }}
      - name: Upload private build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/*.zip
          retention-days: 7
