name: Package desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test before packaging
    # LaunchAgent dry-run relies on macOS-native PlistBuddy and plutil.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked dependencies
        run: uv sync --frozen --group dev
      - name: Run tests
        run: uv run pytest

  package:
    name: Package ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked dependencies
        run: uv sync --frozen --group dev
      - name: Build portable desktop archive
        run: uv run python scripts/package_pyinstaller.py --target ${{ matrix.target }}
      - name: Upload private build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/*.zip
          retention-days: 7
